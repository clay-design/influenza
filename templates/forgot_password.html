<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEMRI-CGHR – Forgot Password</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <style>
        body {
            background: linear-gradient(145deg, #0b1a2e 0%, #1a2f44 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .card {
            background: #ffffff;
            border-radius: 24px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .card h3 { font-weight: 700; color: #0b1a2e; }
        .card p { color: #5a7a9a; font-size: 0.9rem; }
        .form-control {
            border-radius: 12px;
            padding: 0.7rem 1rem;
            border: 1px solid #d8e2ed;
        }
        .form-control:focus {
            border-color: #3b9eff;
            box-shadow: 0 0 0 3px rgba(59,158,255,0.15);
        }
        .btn-warning {
            background: #ffc107;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            padding: 0.75rem;
        }
        .btn-warning:hover { background: #e0a800; }
        .auth-links { margin-top: 1rem; font-size: 0.9rem; }
        .auth-links a { color: #3b9eff; text-decoration: none; }
        .auth-links a:hover { text-decoration: underline; }
        .alert { border-radius: 12px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="text-center mb-4">
            <h3><i class="fa fa-key me-2"></i>Forgot Password</h3>
            <p class="text-muted">Enter the email address associated with your account.</p>
        </div>
        <div id="forgotMessage" class="mt-2"></div>
        <form id="forgotForm">
            <div class="mb-3">
                <label class="form-label small fw-bold text-secondary">Email Address</label>
                <input type="email" id="email" class="form-control" required placeholder="you@example.com">
            </div>
            <button type="submit" class="btn btn-warning w-100 fw-bold py-2">Send Reset Link</button>
        </form>
        <div class="auth-links text-center">
            <a href="/login">Back to Login</a>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <script>
        $('#forgotForm').submit(function(e) {
            e.preventDefault();
            $('#forgotMessage').empty();
            $.ajax({
                url: '/api/forgot-password',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({ email: $('#email').val() }),
                success: function(res) {
                    $('#forgotMessage').html('<div class="alert alert-success">' + res.message + '</div>');
                    $('#forgotForm')[0].reset();
                },
                error: function(xhr) {
                    var msg = xhr.responseJSON ? xhr.responseJSON.message : 'Error';
                    $('#forgotMessage').html('<div class="alert alert-danger">' + msg + '</div>');
                }
            });
        });
    </script>
</body>
</html>
