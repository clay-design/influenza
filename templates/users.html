{% extends "base.html" %}
{% block content %}
<div class="row g-4">
    <div class="col-md-5">
        <div class="card-modern p-4">
            <h4 class="text-dark fw-bold mb-3"><i class="fa fa-user-plus text-warning me-2"></i>Add User</h4>
            <form id="addUserForm">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" id="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" id="full_name" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Initials</label>
                    <input type="text" id="initials" class="form-control" maxlength="3" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" id="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Role</label>
                    <select id="role" class="form-select" required>
                        <option value="Data Manager">Data Manager</option>
                        <option value="Field Technician">Field Technician</option>
                        <option value="Super Admin">Super Admin</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-warning w-100 fw-bold">Create User</button>
            </form>
            <div id="userMessage" class="mt-3"></div>
        </div>
    </div>

    <div class="col-md-7">
        <div class="card-modern p-4">
            <h4 class="text-dark fw-bold mb-3"><i class="fa fa-users text-info me-2"></i>User Management</h4>
            <div id="userListContainer">
                <p class="text-muted small">Loading users...</p>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="resetPasswordModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-warning">
                <h5 class="modal-title"><i class="fa fa-key me-2"></i>Reset Password</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <p>Reset password for: <strong id="resetUserDisplay"></strong></p>
                <input type="hidden" id="resetUserId">
                <div class="mb-3">
                    <label class="form-label">New Password</label>
                    <input type="password" id="resetNewPassword" class="form-control" required minlength="6">
                </div>
                <div class="mb-3">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" id="resetConfirmPassword" class="form-control" required minlength="6">
                </div>
                <div id="resetMessage" class="mt-2"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-danger" id="resetPasswordBtn"><i class="fa fa-key"></i> Reset Password</button>
            </div>
        </div>
    </div>
</div>

<script>
    function loadUsers() {
        $.getJSON('/api/users/list', function(users) {
            if (users.length === 0) {
                $('#userListContainer').html('<p class="text-muted small">No users found.</p>');
                return;
            }
            var html = '<div class="table-responsive"><table class="table table-striped table-hover small">';
            html += '<thead><tr><th>Username</th><th>Full Name</th><th>Initials</th><th>Email</th><th>Role</th><th>Action</th></tr></thead><tbody>';
            users.forEach(function(u) {
                html += '<tr>';
                html += '<td>' + u.username + '</td>';
                html += '<td>' + u.full_name + '</td>';
                html += '<td>' + u.initials + '</td>';
                html += '<td>' + (u.email || 'N/A') + '</td>';
                html += '<td><span class="badge bg-secondary">' + u.role + '</span></td>';
                html += '<td><button class="btn btn-sm btn-outline-danger" onclick="openResetModal(' + u.id + ', \'' + u.username + '\')"><i class="fa fa-key"></i> Reset</button></td>';
                html += '</tr>';
            });
            html += '</tbody></table></div>';
            $('#userListContainer').html(html);
        }).fail(function() {
            $('#userListContainer').html('<div class="alert alert-danger small">Error loading users.</div>');
        });
    }

    function openResetModal(userId, username) {
        $('#resetUserId').val(userId);
        $('#resetUserDisplay').text(username);
        $('#resetNewPassword').val('');
        $('#resetConfirmPassword').val('');
        $('#resetMessage').html('');
        $('#resetPasswordModal').modal('show');
    }

    $('#resetPasswordBtn').click(function() {
        var userId = $('#resetUserId').val();
        var newPass = $('#resetNewPassword').val();
        var confirmPass = $('#resetConfirmPassword').val();

        if (newPass.length < 6) {
            $('#resetMessage').html('<div class="alert alert-danger">Password must be at least 6 characters.</div>');
            return;
        }
        if (newPass !== confirmPass) {
            $('#resetMessage').html('<div class="alert alert-danger">Passwords do not match.</div>');
            return;
        }

        $.ajax({
            url: '/api/admin/reset-password',
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({
                user_id: userId,
                new_password: newPass
            }),
            success: function(res) {
                $('#resetMessage').html('<div class="alert alert-success">' + res.message + '</div>');
                setTimeout(function() {
                    $('#resetPasswordModal').modal('hide');
                    loadUsers();
                }, 1500);
            },
            error: function(xhr) {
                var msg = xhr.responseJSON ? xhr.responseJSON.message : 'Error';
                $('#resetMessage').html('<div class="alert alert-danger">' + msg + '</div>');
            }
        });
    });

    $('#addUserForm').submit(function(e) {
        e.preventDefault();
        var data = {
            username: $('#username').val(),
            full_name: $('#full_name').val(),
            initials: $('#initials').val(),
            email: $('#email').val(),
            role: $('#role').val(),
            password: $('#password').val()
        };
        $.ajax({
            url: '/api/users/add',
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify(data),
            success: function(res) {
                $('#userMessage').html('<div class="alert alert-success">' + res.message + '</div>');
                $('#addUserForm')[0].reset();
                loadUsers();
            },
            error: function(xhr) {
                var msg = xhr.responseJSON ? xhr.responseJSON.message : 'Error';
                $('#userMessage').html('<div class="alert alert-danger">' + msg + '</div>');
            }
        });
    });

    $(document).ready(function() {
        loadUsers();
    });
</script>
{% endblock %}
