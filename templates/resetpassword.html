<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEMRI-CGHR – Reset Password</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <style>
        body {
            background: linear-gradient(145deg, #0b1a2e 0%, #1a2f44 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .card {
            background: #ffffff;
            border-radius: 24px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .card h3 { font-weight: 700; color: #0b1a2e; }
        .form-control {
            border-radius: 12px;
            padding: 0.7rem 1rem;
            border: 1px solid #d8e2ed;
        }
        .form-control:focus {
            border-color: #3b9eff;
            box-shadow: 0 0 0 3px rgba(59,158,255,0.15);
        }
        .btn-success {
            background: #1db954;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            padding: 0.75rem;
        }
        .btn-success:hover { background: #17a44a; }
        .alert { border-radius: 12px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="text-center mb-4">
            <h3><i class="fa fa-lock me-2"></i>Reset Password</h3>
        </div>
        <div id="resetMessage"></div>
        <form id="resetForm">
            <input type="hidden" id="token" value="{{ token }}">
            <div class="mb-3">
                <label class="form-label small fw-bold text-secondary">New Password</label>
                <input type="password" id="new_password" class="form-control" required placeholder="Enter new password">
            </div>
            <div class="mb-3">
                <label class="form-label small fw-bold text-secondary">Confirm Password</label>
                <input type="password" id="confirm_password" class="form-control" required placeholder="Confirm new password">
            </div>
            <button type="submit" class="btn btn-success w-100 fw-bold py-2">Reset Password</button>
        </form>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <script>
        $('#resetForm').submit(function(e) {
            e.preventDefault();
            $('#resetMessage').empty();
            var newPass = $('#new_password').val();
            var confirmPass = $('#confirm_password').val();
            if (newPass !== confirmPass) {
                $('#resetMessage').html('<div class="alert alert-danger">Passwords do not match</div>');
                return;
            }
            $.ajax({
                url: '/api/reset-password',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({
                    token: $('#token').val(),
                    new_password: newPass
                }),
                success: function() {
                    $('#resetMessage').html('<div class="alert alert-success">Password reset! <a href="/login">Log in</a></div>');
                    $('#resetForm')[0].reset();
                },
                error: function(xhr) {
                    var msg = xhr.responseJSON ? xhr.responseJSON.message : 'Error';
                    $('#resetMessage').html('<div class="alert alert-danger">' + msg + '</div>');
                }
            });
        });
    </script>
</body>
</html>
